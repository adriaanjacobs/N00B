################################################################
# SPEC CPU2006 config file for ARM 64-bit using Linux clang-15
################################################################
ignore_errors = yes
action = validate
output_format = pdf,text,html,config,screen,asc
ext = clang15-lto-@SPEC_EXT@
allow_extension_override = yes
PATHSEP = /
strict_rundir_verify = 0
monitor_wrapper = /usr/bin/time -v -o time.log $command

default=default=default=default:
CC           = clang-15 -ggdb -Xclang -no-opaque-pointers -flto -std=gnu89 -D_GNU_SOURCE -fpermissive -Wno-return-type -Xclang -disable-O0-optnone
CLD          = @NOOB_CLD@
CXX          = clang++-15 -ggdb -Xclang -no-opaque-pointers -flto -std=c++98 -D_GNU_SOURCE -fpermissive -Wno-return-type -Xclang -disable-O0-optnone
CXXLD        = @NOOB_CXXLD@
FC           = we-do-not-support-fortran

################################################################
# Optimization Flags
################################################################

default=base=default=default:
COPTIMIZE     = -O2 -fno-strict-aliasing -mcpu=native
CXXOPTIMIZE  = -O2 -fno-strict-aliasing -mcpu=native
FOPTIMIZE    = -O2 -fno-strict-aliasing


#####################################################################
# Portability
#####################################################################

default=default=default=default:
PORTABILITY = -DSPEC_CPU_LP64 -Wno-int-conversion

400.perlbench=default=default=default:
CPORTABILITY = -DSPEC_CPU_LINUX
EXTRA_CFLAGS = -fno-strict-aliasing

403.gcc=default=default=default:
CPORTABILITY = -DSPEC_CPU_LINUX @NOOB_STRIPTOP@
EXTRA_CFLAGS = -Dalloca=_alloca

416.gamess=default=default=default:
EXTRA_FFLAGS = -ffixed-form
FPORTABILITY = -DSPEC_CPU_LINUX

429.mcf=default=default=default:
CPORTABILITY = -DWANT_STDC_PROTO

435.gromacs=default=default=default:
FPORTABILITY = -DSPEC_CPU_APPEND_UNDERSCORE

436.cactusADM=default=default=default:
FPORTABILITY = -DSPEC_CPU_LINUX
EXTRA_FFLAGS = -fno-second-underscore

454.calculix=default=default=default:
PORTABILITY = -DSPEC_CPU_NOZMODIFIER

450.soplex=default=default=default:
EXTRA_CXXFLAGS = -fno-strict-aliasing

456.hmmer=default=default=default:
EXTRA_CFLAGS = -funsigned-char
EXTRA_LDFLAGS = -lm

462.libquantum=default=default=default:
CPORTABILITY = -DSPEC_CPU_LINUX

464.h264ref=default=default=default:
EXTRA_CFLAGS = -fsigned-char
EXTRA_LIBS = -lm

481.wrf=default=default=default:
PORTABILITY = -DSPEC_CPU_LINUX -DSPEC_CPU_CASE_FLAG -DSPEC_CPU_LOGICAL_STRICT
FPORTABILITY = -frecord-marker=4
wrf_data_header_size = 8

482.sphinx3=default=default=default:
EXTRA_CFLAGS   = -fsigned-char

483.xalancbmk=default=default=default:
CXXPORTABILITY = -DSPEC_CPU_LINUX
